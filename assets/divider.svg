<svg width="1200" height="12" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:0" />
      <stop offset="15%" style="stop-color:#06b6d4;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="85%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0" />
    </linearGradient>
    <filter id="line-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes shimmer-line {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }
    .glow-line { animation: shimmer-line 3s ease-in-out infinite; }
  </style>
  <rect x="0" y="5" width="1200" height="1" fill="url(#line-grad)" filter="url(#line-glow)" class="glow-line"/>
  <circle cx="600" cy="6" r="3" fill="#3b82f6" opacity="0.6" filter="url(#line-glow)" class="glow-line"/>
</svg>
