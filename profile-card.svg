<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .light-mode { display: block; }
    .dark-mode { display: none; }
    @media (prefers-color-scheme: dark) {
      .light-mode { display: none; }
      .dark-mode { display: block; }
    }
    .text-main { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 36px; font-weight: bold; }
    .text-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 20px; }
    .text-pill { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; }
  </style>

  <!-- LIGHT MODE -->
  <g class="light-mode">
    <defs>
      <filter id="card-light" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="9" dy="9" stdDeviation="16" flood-color="#a3b1c6" flood-opacity="0.6" result="s1"/>
        <feDropShadow dx="-9" dy="-9" stdDeviation="16" flood-color="#ffffff" flood-opacity="0.6" result="s2"/>
        <feMerge>
          <feMergeNode in="s1"/>
          <feMergeNode in="s2"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <filter id="pill-light" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="4" dy="4" stdDeviation="8" flood-color="#a3b1c6" flood-opacity="0.6" result="s1"/>
        <feDropShadow dx="-4" dy="-4" stdDeviation="8" flood-color="#ffffff" flood-opacity="0.6" result="s2"/>
        <feMerge>
          <feMergeNode in="s1"/>
          <feMergeNode in="s2"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <rect width="800" height="400" fill="#e0e5ec"/>
    <rect x="50" y="50" width="700" height="300" rx="20" fill="#e0e5ec" filter="url(#card-light)"/>

    <text x="100" y="130" class="text-main" fill="#333333">Hi, I'm Rafi Darussalam</text>
    <text x="100" y="165" class="text-sub" fill="#666666">Full-Stack Developer</text>

    <!-- Row 1 -->
    <rect x="100" y="210" width="100" height="40" rx="20" fill="#e0e5ec" filter="url(#pill-light)"/>
    <text x="150" y="235" class="text-pill" fill="#444444" text-anchor="middle">Next.js</text>

    <rect x="220" y="210" width="90" height="40" rx="20" fill="#e0e5ec" filter="url(#pill-light)"/>
    <text x="265" y="235" class="text-pill" fill="#444444" text-anchor="middle">Laravel</text>

    <rect x="330" y="210" width="120" height="40" rx="20" fill="#e0e5ec" filter="url(#pill-light)"/>
    <text x="390" y="235" class="text-pill" fill="#444444" text-anchor="middle">React + Vite</text>

    <!-- Row 2 -->
    <rect x="100" y="270" width="90" height="40" rx="20" fill="#e0e5ec" filter="url(#pill-light)"/>
    <text x="145" y="295" class="text-pill" fill="#444444" text-anchor="middle">Node.js</text>

    <rect x="210" y="270" width="80" height="40" rx="20" fill="#e0e5ec" filter="url(#pill-light)"/>
    <text x="250" y="295" class="text-pill" fill="#444444" text-anchor="middle">pnpm</text>

    <rect x="310" y="270" width="160" height="40" rx="20" fill="#e0e5ec" filter="url(#pill-light)"/>
    <text x="390" y="295" class="text-pill" fill="#444444" text-anchor="middle">Google Antigravity</text>
  </g>

  <!-- DARK MODE -->
  <g class="dark-mode">
    <defs>
      <filter id="card-dark" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="9" dy="9" stdDeviation="16" flood-color="#111316" flood-opacity="0.8" result="s1"/>
        <feDropShadow dx="-9" dy="-9" stdDeviation="16" flood-color="#2c323a" flood-opacity="0.8" result="s2"/>
        <feMerge>
          <feMergeNode in="s1"/>
          <feMergeNode in="s2"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <filter id="pill-dark" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="4" dy="4" stdDeviation="8" flood-color="#111316" flood-opacity="0.8" result="s1"/>
        <feDropShadow dx="-4" dy="-4" stdDeviation="8" flood-color="#2c323a" flood-opacity="0.8" result="s2"/>
        <feMerge>
          <feMergeNode in="s1"/>
          <feMergeNode in="s2"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <rect width="800" height="400" fill="#1e2227"/>
    <rect x="50" y="50" width="700" height="300" rx="20" fill="#1e2227" filter="url(#card-dark)"/>

    <text x="100" y="130" class="text-main" fill="#e6edf3">Hi, I'm Rafi Darussalam</text>
    <text x="100" y="165" class="text-sub" fill="#8b949e">Full-Stack Developer</text>

    <!-- Row 1 -->
    <rect x="100" y="210" width="100" height="40" rx="20" fill="#1e2227" filter="url(#pill-dark)"/>
    <text x="150" y="235" class="text-pill" fill="#e6edf3" text-anchor="middle">Next.js</text>

    <rect x="220" y="210" width="90" height="40" rx="20" fill="#1e2227" filter="url(#pill-dark)"/>
    <text x="265" y="235" class="text-pill" fill="#e6edf3" text-anchor="middle">Laravel</text>

    <rect x="330" y="210" width="120" height="40" rx="20" fill="#1e2227" filter="url(#pill-dark)"/>
    <text x="390" y="235" class="text-pill" fill="#e6edf3" text-anchor="middle">React + Vite</text>

    <!-- Row 2 -->
    <rect x="100" y="270" width="90" height="40" rx="20" fill="#1e2227" filter="url(#pill-dark)"/>
    <text x="145" y="295" class="text-pill" fill="#e6edf3" text-anchor="middle">Node.js</text>

    <rect x="210" y="270" width="80" height="40" rx="20" fill="#1e2227" filter="url(#pill-dark)"/>
    <text x="250" y="295" class="text-pill" fill="#e6edf3" text-anchor="middle">pnpm</text>

    <rect x="310" y="270" width="160" height="40" rx="20" fill="#1e2227" filter="url(#pill-dark)"/>
    <text x="390" y="295" class="text-pill" fill="#e6edf3" text-anchor="middle">Google Antigravity</text>
  </g>
</svg>
