<svg width="800" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    .light-mode { display: block; }
    .dark-mode { display: none; }
    @media (prefers-color-scheme: dark) {
      .light-mode { display: none; }
      .dark-mode { display: block; }
    }
    .text-main { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 42px; font-weight: 800; letter-spacing: -1px; }
    .text-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 24px; font-weight: 500; }
    .text-desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 400; opacity: 0.8; }
  </style>

  <defs>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- LIGHT MODE -->
  <g class="light-mode">
    <rect width="800" height="250" fill="#ffffff" rx="16" stroke="#e1e4e8" stroke-width="1.5"/>
    <path d="M1.5,16 a14.5,14.5 0 0,1 14.5,-14.5 h768 a14.5,14.5 0 0,1 14.5,14.5 v5 h-797 z" fill="url(#accent-gradient)" />
    
    <!-- Accent Icon representation -->
    <circle cx="70" cy="125" r="24" fill="#eff6ff" />
    <circle cx="70" cy="125" r="10" fill="url(#accent-gradient)" />

    <text x="130" y="105" class="text-main" fill="#111827">Hi, I'm Rafi Darussalam 👋</text>
    <text x="130" y="145" class="text-sub" fill="#374151">Full-Stack Developer</text>
    <text x="130" y="180" class="text-desc" fill="#6b7280">Turning ideas into robust and beautiful digital experiences.</text>
  </g>

  <!-- DARK MODE -->
  <g class="dark-mode">
    <rect width="800" height="250" fill="#0d1117" rx="16" stroke="#30363d" stroke-width="1.5"/>
    <path d="M1.5,16 a14.5,14.5 0 0,1 14.5,-14.5 h768 a14.5,14.5 0 0,1 14.5,14.5 v5 h-797 z" fill="url(#accent-gradient)" />
    
    <circle cx="70" cy="125" r="24" fill="#1e293b" />
    <circle cx="70" cy="125" r="10" fill="url(#accent-gradient)" />

    <text x="130" y="105" class="text-main" fill="#f9fafb">Hi, I'm Rafi Darussalam 👋</text>
    <text x="130" y="145" class="text-sub" fill="#d1d5db">Full-Stack Developer</text>
    <text x="130" y="180" class="text-desc" fill="#9ca3af">Turning ideas into robust and beautiful digital experiences.</text>
  </g>
</svg>
